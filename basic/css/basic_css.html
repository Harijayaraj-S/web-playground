<!DOCTYPE html>
<html>
    <head>
        <title>Basic CSS</title>
        <style>
            h1{
                color: rgb(255, 89, 0);
            }
            p{
                font-size: 20px;
            }
            .highlight {
                color: red;
            }
            #mainTitle {
                color: green;
            }
            .big {
                font-size: 30px;
            }
        </style>
    </head>
    <body>
        <h1>CSS</h1>
        <h1 id="mainTitle">Main Heading</h1>
        <p class="highlight big">Important text</p>
    </body>
</html>
