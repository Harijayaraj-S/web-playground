<!DOCTYPE html>
<html>
    <head>
        <title>Styled Page</title>

        <style>
            body {
                margin: 0;
                font-family: Arial;
            }

            header {
                background: #333;
                color: white;
                padding: 20px;
                text-align: center;
            }

            .navbar {
                display: flex;
                justify-content: space-around;
                background: #555;
                color: white;
                padding: 10px;
            }

            .card {
                background: #f4f4f4;
                padding: 20px;
                margin: 10px;
                border-radius: 8px;
            }
    </style>
    </head>
    <body>

        <header>My Website</header>

        <div class="navbar">
            <div>Home</div>
            <div>Services</div>
            <div>Contact</div>
        </div>

        <div class="card">Welcome Content</div>

    </body>
</html>
