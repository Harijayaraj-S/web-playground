<!DOCTYPE html>
<html>
    <head>
        <title>Show Hide</title>
    </head>
    <body>
        <p id="text">Toggle me</p>
        <button onclick="toggle()">Toggle</button>

        <script>
        function toggle() {
            let el = document.getElementById("text");

            if (el.style.display === "none") {
                el.style.display = "block";
            } else {
                el.style.display = "none";
            }
        }
        </script>

    </body>
</html>
