<!DOCTYPE html>
<html>
    <head>
        <title>Change Style</title>
    </head>
    <body>
        <p id="para">Hello</p>

        <button onclick="changeStyle()">Style</button>
        <script>
        function changeStyle() {
        let p = document.getElementById("para");
            p.style.color = "red";
            p.style.fontSize = "30px";
        }
    </script>

    </body>
</html>
