<!DOCTYPE html>
<html>
    <head>
        <title>JS Change Content</title>
    </head>
    <body>
        <p id="text"> Old Text</p>
        <button onclick="chagenText()">Change</button>

        <script>
            function chagenText(){
                document.getElementById("text").innerHTML = "New Text";
            }
        </script>
    </body>
</html>
